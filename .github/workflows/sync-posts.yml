# .github/workflows/sync-blog-posts.yml
name: Sync Blog Posts

on:
  repository_dispatch:
    types: [sync-posts]
  workflow_dispatch:
  schedule:
    # Run daily at midnight UTC
    - cron: '30 18 * * *'

jobs:
  sync-posts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout guimox-web repository
        uses: actions/checkout@v4

      - name: Download blog posts
        run: |
          mkdir -p src/content/posts
          cd src/content/posts
          
          # Download all .md files from the posts repository
          wget -r -np -nH -R -A "*.md" \
              https://raw.githubusercontent.com/guimox/guimox-posts/main/


      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.PAT_GITHUB }}
          publish_dir: ./dist