name: Sync Blog Posts

on:
  repository_dispatch:
    types: [sync-posts]
  workflow_dispatch:
  schedule:
    - cron: '50 18 * * *'

jobs:
  sync-posts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout guimox-web repository
        uses: actions/checkout@v4

      - name: Download blog posts
        run: |
          mkdir -p src/content/posts
          cd src/content/posts
          git clone --depth 1 --branch main https://github.com/guimox/guimox-posts.git temp_repo
          cp temp_repo/*.md . 
          rm -rf temp_repo

      - name: Commit and Push Changes
        run: |
          git config --local user.name "GitHub Actions Bot"
          git config --local user.email "actions@github.com"
          git add src/content/posts
          git commit -m "chore: update blog posts automatically"
          git push https://guimox:${{ secrets.PAT_GITHUB }}@github.com/guimox/guimox-web.git
